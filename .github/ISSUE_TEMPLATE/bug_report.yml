name: Bug Report
description: Report a system defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem Affected
      options:
        - Platform
        - Core
        - Robotics
        - Security
        - Simulation
        - Analytics
        - Infrastructure
        - Shared
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Step one
        2. Step two
        3. Observe issue
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Major
        - Minor