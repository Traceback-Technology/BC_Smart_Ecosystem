name: Feature Request
description: Propose a new feature for a subsystem
title: "[Feature]: "
labels: ["feature"]
body:
  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - Platform
        - Core
        - Robotics
        - Security
        - Simulation
        - Analytics
        - Infrastructure
        - Shared
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: High-level description of the feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define clear completion requirements.
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (Critical)
        - P1 (High)
        - P2 (Normal)
        - P3 (Low)