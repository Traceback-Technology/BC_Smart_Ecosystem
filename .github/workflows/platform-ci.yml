name: Platform CI

on:
  pull_request:
    paths:
      - 'platform/**'

jobs:

  web-platform-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform/web-platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  mobile-platform-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform/mobile-interface

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test