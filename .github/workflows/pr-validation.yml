name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PR title
        run: |
          if [[ ! "${{ github.event.pull_request.title }}" =~ ^\[(Feature|Bug|Refactor|Integration|Architecture|Docs)\] ]]; then
            echo "PR title must start with [Feature], [Bug], etc."
            exit 1
          fi

      - name: Ensure issue is linked
        run: |
          if [[ "${{ github.event.pull_request.body }}" != *"Closes #"* ]]; then
            echo "PR must reference an issue using 'Closes #'"
            exit 1
          fi