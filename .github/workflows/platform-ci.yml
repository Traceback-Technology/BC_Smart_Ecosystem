name: Platform CI

on:
  pull_request:
    paths:
      - 'src/platform/**'

jobs:
  build-platform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (Web)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Web Dependencies
        working-directory: src/platform/web
        run: npm install

      - name: Build Web
        working-directory: src/platform/web
        run: npm run build

      - name: Setup .NET (Backend)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Backend
        working-directory: src/platform/backend
        run: dotnet build